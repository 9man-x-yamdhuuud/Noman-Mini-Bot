<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9ᴍᴀɴ-x-ʏᴀᴍᴅʜᴜᴅ</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <style>
        /* ============================================
           RESET & BASE
           ============================================ */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            background: #0a0a0f;
            color: #fff;
            overflow: hidden;
            position: relative;
        }

        /* ============================================
           CYBER NEON MESH BACKGROUND (Canvas)
           ============================================ */
        #cyberMeshCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            display: block;
            pointer-events: none;
            will-change: transform;
        }

        /* ============================================
           CARD — simple, dark, subtle glow
           ============================================ */
        .card {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 400px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 24px;
            padding: 28px 22px;
            text-align: center;
            border: 1px solid rgba(0, 255, 255, 0.15);
            box-shadow:
                0 0 40px rgba(0, 255, 255, 0.04),
                0 0 80px rgba(0, 200, 255, 0.02);
            transition: box-shadow 0.3s;
        }

        .card:hover {
            box-shadow:
                0 0 60px rgba(0, 255, 255, 0.06),
                0 0 120px rgba(0, 200, 255, 0.04);
        }

        /* ============================================
           TEXT — simple white with neon glow
           ============================================ */
        .title {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            margin-bottom: 2px;
        }

        .sub-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #fff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.15);
            margin-bottom: 6px;
        }

        .status-text {
            font-size: 0.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 22px;
        }

        .status-text.glow {
            color: rgba(0, 255, 255, 0.7);
            text-shadow: 0 0 12px rgba(0, 255, 255, 0.15);
        }

        /* ============================================
           INPUT — simple neon border
           ============================================ */
        .input-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 20px auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s;
        }

        .input-container:focus-within {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.05);
        }

        .input-container input {
            width: 100%;
            border: none;
            outline: none;
            padding: 14px;
            border-radius: 11px;
            background: transparent;
            color: #fff;
            text-align: center;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
        }

        .input-container input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* ============================================
           BUTTON — simple neon border
           ============================================ */
        .btn-container {
            width: 100%;
            max-width: 320px;
            margin: 0 auto 15px auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            background: rgba(0, 0, 0, 0.6);
            transition: border-color 0.3s, transform 0.15s;
            cursor: pointer;
        }

        .btn-container:hover {
            border-color: rgba(0, 255, 255, 0.5);
            transform: scale(1.02);
        }

        .btn-container button {
            width: 100%;
            border: none;
            outline: none;
            padding: 14px;
            border-radius: 11px;
            background: transparent;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ============================================
           RESULT BOX — simple neon border
           ============================================ */
        .result-container {
            width: 100%;
            max-width: 320px;
            margin: 15px auto 0 auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.6);
            display: none;
            transition: border-color 0.3s;
        }

        .result-container.visible {
            display: block;
        }

        .result-container .result-inner {
            padding: 14px;
            border-radius: 11px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 4px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .result-container .result-inner.error {
            color: #ff4d4d;
            letter-spacing: normal;
        }

        .result-container .result-inner.loading {
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: normal;
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer-text {
            margin-top: 18px;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 0.5px;
        }

        .footer-text .highlight {
            color: rgba(0, 255, 255, 0.4);
        }

        /* ============================================
           RESPONSIVE
           ============================================ */
        @media (max-width: 480px) {
            .card {
                padding: 20px 14px;
            }
            .title {
                font-size: 1.5rem;
            }
            .sub-title {
                font-size: 1.2rem;
            }
            .input-container,
            .btn-container,
            .result-container {
                max-width: 280px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== CYBER NEON MESH CANVAS ===== -->
    <canvas id="cyberMeshCanvas"></canvas>

    <!-- ===== CARD ===== -->
    <div class="card">

        <div class="title">🐊𝟵𝗠𝗔𝗡-𝗫-𝗬𝗔𝗠𝗗𝗛𝗨𝗗 𝗪𝗣 𝗕𝗢𝗧</div>
        <div class="sub-title">PAIR CODE</div>

        <div class="status-text">TYPE YOUR WHATSAPP NUMBER</div>

        <!-- Input -->
        <div class="input-container">
            <input type="text" id="number" placeholder="918075498750" />
        </div>

        <!-- Button -->
        <div class="btn-container" onclick="getCode()">
            <button>GET PAIR CODE</button>
        </div>

        <!-- Result -->
        <div class="result-container" id="resultContainer">
            <div class="result-inner" id="resultInner">----</div>
        </div>

        <div class="status-text glow" style="margin-top:22px; margin-bottom:4px;">WHATSAPP BOT</div>
        <div class="status-text" style="margin-bottom:2px;">MADE BY 9ᴍᴀɴ-x-ʏᴀᴍᴅʜᴜᴅ</div>
        <div class="status-text" style="font-size:0.65rem; opacity:0.5;">9ᴍᴀɴ-x-ʏᴀᴍᴅʜᴜᴅ MINI BOT EDITION 2026</div>

    </div>

    <script>
        // ============================================================
        //  CYBER NEON MESH WALLPAPER — grid + glowing nodes
        //  Performance‑optimised for smooth 30fps
        // ============================================================
        (function initCyberMesh() {
            const canvas = document.getElementById('cyberMeshCanvas');
            const ctx = canvas.getContext('2d');

            let w, h;
            let nodes = [];
            const isMobile = window.innerWidth < 600;

            // Grid settings
            const GRID_SPACING = isMobile ? 60 : 80;
            const NODE_RADIUS = isMobile ? 2.5 : 3.5;
            const LINE_GLOW = isMobile ? 6 : 10;
            const NODE_GLOW = isMobile ? 8 : 14;

            // Neon cyan palette
            const CYAN = { r: 0, g: 255, b: 255 };
            const BLUE = { r: 30, g: 180, b: 255 };
            const PURPLE = { r: 160, g: 80, b: 255 };

            function resize() {
                w = canvas.width = window.innerWidth;
                h = canvas.height = window.innerHeight;
                buildNodes();
            }

            function buildNodes() {
                nodes = [];
                const cols = Math.ceil(w / GRID_SPACING) + 1;
                const rows = Math.ceil(h / GRID_SPACING) + 1;
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        const x = col * GRID_SPACING + (row % 2) * (GRID_SPACING / 2);
                        const y = row * GRID_SPACING * 0.86;
                        if (x > w + 20 || y > h + 20) continue;
                        nodes.push({
                            x: x,
                            y: y,
                            baseX: x,
                            baseY: y,
                            phase: Math.random() * Math.PI * 2,
                            speed: 0.008 + Math.random() * 0.012,
                            amp: 2 + Math.random() * 4,
                            // random color tint
                            tint: Math.random() > 0.7 ? PURPLE : (Math.random() > 0.5 ? BLUE : CYAN)
                        });
                    }
                }
            }

            window.addEventListener('resize', () => {
                resize();
            });
            resize();

            // ─── draw frame ──────────────────────────────────────
            let lastTime = 0;
            const TARGET_FPS = 30;
            const frameInterval = 1000 / TARGET_FPS;

            function draw(timestamp) {
                const delta = timestamp - lastTime;
                if (delta >= frameInterval) {
                    lastTime = timestamp - (delta % frameInterval);

                    ctx.clearRect(0, 0, w, h);

                    // ── update node positions (gentle wave) ──
                    for (const n of nodes) {
                        n.phase += n.speed;
                        const wave = Math.sin(n.phase) * n.amp;
                        n.x = n.baseX + wave * 0.3;
                        n.y = n.baseY + Math.cos(n.phase * 0.7) * n.amp * 0.4;
                    }

                    // ── draw grid lines ──────────────────────
                    ctx.lineWidth = 0.8;
                    for (let i = 0; i < nodes.length; i++) {
                        const a = nodes[i];
                        // horizontal-ish connections
                        for (let j = i + 1; j < nodes.length; j++) {
                            const b = nodes[j];
                            const dx = a.x - b.x;
                            const dy = a.y - b.y;
                            const dist = dx * dx + dy * dy;
                            const maxDist = (GRID_SPACING * 1.5) ** 2;
                            if (dist < maxDist && dist > 0) {
                                const alpha = 1 - Math.sqrt(dist) / (GRID_SPACING * 1.5);
                                const alpha2 = alpha * alpha * 0.45;
                                // blend colors
                                const r = (a.tint.r + b.tint.r) / 2;
                                const g = (a.tint.g + b.tint.g) / 2;
                                const b_ = (a.tint.b + b.tint.b) / 2;
                                ctx.beginPath();
                                ctx.moveTo(a.x, a.y);
                                ctx.lineTo(b.x, b.y);
                                ctx.strokeStyle = `rgba(${r},${g},${b_},${alpha2})`;
                                ctx.shadowColor = `rgba(${r},${g},${b_},${alpha2 * 0.3})`;
                                ctx.shadowBlur = LINE_GLOW * alpha;
                                ctx.stroke();
                                ctx.shadowBlur = 0;
                            }
                        }
                    }

                    // ── draw nodes ──────────────────────────
                    for (const n of nodes) {
                        const pulse = 0.6 + 0.4 * Math.sin(n.phase * 1.3);
                        const r = n.tint.r;
                        const g = n.tint.g;
                        const b_ = n.tint.b;

                        // glow
                        ctx.shadowColor = `rgba(${r},${g},${b_},0.5)`;
                        ctx.shadowBlur = NODE_GLOW * pulse;

                        ctx.beginPath();
                        ctx.arc(n.x, n.y, NODE_RADIUS * (0.7 + 0.4 * pulse), 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(${r},${g},${b_},${0.5 + 0.4 * pulse})`;
                        ctx.fill();

                        // inner bright core
                        ctx.shadowBlur = 0;
                        ctx.beginPath();
                        ctx.arc(n.x, n.y, NODE_RADIUS * 0.35, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255,255,255,${0.2 + 0.3 * pulse})`;
                        ctx.fill();
                    }

                    // subtle vignette
                    const grad = ctx.createRadialGradient(w / 2, h / 2, 0, w / 2, h / 2, Math.max(w, h) * 0.65);
                    grad.addColorStop(0, 'rgba(0,0,0,0)');
                    grad.addColorStop(1, 'rgba(0,0,0,0.4)');
                    ctx.fillStyle = grad;
                    ctx.fillRect(0, 0, w, h);
                }
                requestAnimationFrame(draw);
            }

            requestAnimationFrame(draw);
        })();


        // ============================================================
        //  APP LOGIC — unchanged (but simplified result display)
        // ============================================================
        async function getCode() {
            const num = document.getElementById('number').value.replace(/[^0-9]/g, '');
            const container = document.getElementById('resultContainer');
            const inner = document.getElementById('resultInner');

            // hide if empty
            if (!num) {
                container.classList.add('visible');
                inner.className = 'result-inner error';
                inner.style.letterSpacing = 'normal';
                inner.innerText = 'APNA WHATSAPP NUMBER LIKHE';
                return;
            }

            // loading state
            container.classList.add('visible');
            inner.className = 'result-inner loading';
            inner.style.letterSpacing = 'normal';
            inner.innerText = 'CONNECTING.....';

            try {
                const res = await fetch(`/code?number=${num}`);
                const data = await res.json();

                if (data.code) {
                    inner.className = 'result-inner';
                    inner.style.letterSpacing = '4px';
                    inner.innerText = data.code;
                } else {
                    inner.className = 'result-inner error';
                    inner.style.letterSpacing = 'normal';
                    inner.innerText = 'SERVER FULL';
                }
            } catch (e) {
                inner.className = 'result-inner error';
                inner.style.letterSpacing = 'normal';
                inner.innerText = 'SERVER IS FULL';
            }
        }

        // optional copy helper (kept for compatibility)
        function copyCode(code) {
            navigator.clipboard.writeText(code);
        }
    </script>

</body>
</html>
